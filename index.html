<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Idiomas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-extrabold text-center text-blue-600 mb-6">English Practice Simulator</h1>

        <div class="flex justify-center mb-10">
            <button onclick="generarNuevosEjercicios()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2">
                ✨ Generar Nuevos Ejercicios
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-400">
                <h2 class="text-2xl font-bold mb-4">🎧 Listening</h2>
                <div class="bg-slate-50 p-4 rounded-lg mb-4 h-24 flex items-center">
                    <p id="texto-escuchar" class="text-lg font-medium">...</p>
                </div>
                <button onclick="reproducirAudio()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl">Reproducir Audio</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-emerald-400">
                <h2 class="text-2xl font-bold mb-4">🎙️ Speaking</h2>
                <div class="bg-slate-50 p-4 rounded-lg mb-4 h-24 flex items-center">
                    <p id="texto-objetivo" class="text-lg font-medium text-emerald-700">...</p>
                </div>
                <button id="btn-hablar" onclick="iniciarMicrofono()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl mb-4">Presiona y Habla</button>
                <p id="resultado-voz" class="text-slate-500 italic text-sm text-center min-h-[1.5rem]"></p>
                <p id="feedback-speaking" class="mt-2 font-bold text-center"></p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-amber-400">
                <h2 class="text-2xl font-bold mb-4">📖 Reading</h2>
                <div class="bg-slate-50 p-4 rounded-lg mb-4 text-sm">
                    <p id="texto-reading" class="font-medium text-slate-700">...</p>
                </div>
                
                <div id="contenedor-preguntas" class="mb-4 space-y-4"></div>

                <button onclick="evaluarReading()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl">Revisar Respuestas</button>
                <p id="feedback-reading" class="mt-3 font-bold text-center"></p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-indigo-400">
                <h2 class="text-2xl font-bold mb-4">✍️ Writing</h2>
                <div class="bg-slate-50 p-4 rounded-lg mb-4">
                    <p id="texto-prompt" class="text-indigo-700 font-semibold text-sm">...</p>
                </div>
                <textarea id="texto-writing" rows="5" class="w-full p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none mb-4" placeholder="Start typing here..."></textarea>
                <button onclick="evaluarWriting()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl">Evaluar Texto</button>
                <div class="mt-4 flex justify-between text-sm">
                    <span class="font-bold text-slate-600">Palabras: <span id="contador-palabras">0</span></span>
                    <span id="feedback-writing" class="font-bold"></span>
                </div>
                <div id="correcciones-writing" class="mt-4 text-sm flex flex-col gap-2"></div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
